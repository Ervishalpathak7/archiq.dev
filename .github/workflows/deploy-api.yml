name: Deploy API

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Generate tags and labels
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ervishalpathak7/archiq-ai
          tags: |
            type=sha
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build + push (with cache)
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Extract SHA 
      - name: Extract SHA tag
        run: |
          FULL_TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep sha- | head -n1)
          TAG=${FULL_TAG##*:}
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      # Deploy
      - name: Install Doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy on DO with SHA image
        run: |
            doctl apps spec get 63add680-6615-44d7-b63c-9e7dccb7e08d > app.yaml
            sed -i "s/tag: .*/tag: ${IMAGE_TAG}/" app.yaml
            doctl apps update 63add680-6615-44d7-b63c-9e7dccb7e08d --spec app.yaml
      
      - name: Verify deployment triggered
        run: doctl apps get 63add680-6615-44d7-b63c-9e7dccb7e08d
        
